<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WIDE - Browser Python IDE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>

<style>
/* --- YOUR STYLING UNCHANGED --- */
body{margin:0;background:#0b0f14;color:white;font-family:Segoe UI;}
#topbar{background:#111;padding:15px;font-size:22px;text-align:center;border-bottom:2px solid #00f7ff;text-shadow:0 0 8px #00f7ff;}
#toolbar{display:flex;justify-content:center;gap:15px;padding:10px;background:#111;border-bottom:1px solid #222;position:relative;}
button{padding:8px 18px;background:#1a1a1a;color:white;border:1px solid #333;border-radius:8px;cursor:pointer;transition:0.2s;}
button:hover{border-color:#00f7ff;color:#00f7ff;box-shadow:0 0 8px #00f7ff;}
.dropdown{position:absolute;top:100%;left:0;background:#111;border:1px solid #333;display:none;flex-direction:column;min-width:220px;z-index:200;}
.dropdown.show{display:flex;}
.dropdown button{background:#111;border:none;border-bottom:1px solid #222;text-align:left;padding:8px 12px;border-radius:0;}
.dropdown button:hover{background:#1a1a1a;color:#00f7ff;}
#main{display:flex;height:85vh;}
#editorContainer{width:50%;height:100%;}
#divider{width:5px;cursor:col-resize;background:#00f7ff;}
#outputContainer{width:50%;background:#000;padding:15px;overflow-y:auto;font-family:monospace;color:#00ff88;box-shadow:inset 0 0 20px #00ff8855;}
.output-line{margin-bottom:4px;}
.error{color:#ff4c4c;}
</style>
</head>
<body>

<!-- AUTH SCREEN UNCHANGED -->
<div id="authScreen">
  <div id="authBox">
    <h2>Login / Sign Up</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <br>
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <button onclick="guest()">Use as Guest</button>
    <p id="authMessage"></p>
  </div>
</div>

<div id="topbar">WIDE - Python IDE</div>

<div id="toolbar">
  <button id="runBtn" onclick="runCode()">Run</button>
  <button onclick="newFile()">New</button>
  <button onclick="copyCode()">Copy</button>
  <button id="saveBtn" onclick="saveFile()" style="display:none;">Save</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="editorContainer">
    <textarea id="code">print("Welcome to WIDE!")</textarea>
  </div>
  <div id="divider"></div>
  <div id="outputContainer"></div>
</div>

<script>
let editor=CodeMirror.fromTextArea(document.getElementById("code"),{
  mode:"python",
  theme:"dracula",
  lineNumbers:true
});

let outputContainer=document.getElementById("outputContainer");
let saveBtn=document.getElementById("saveBtn");
let toolbar=document.getElementById("toolbar");
let currentUser=null;

const MASTER_ACCOUNT="Willspurs21";
const MASTER_PASSWORD="Will_spurs21";

/* ---------------- AUTH ---------------- */

async function hash(text){
  const encoder=new TextEncoder();
  const data=encoder.encode(text);
  const hashBuffer=await crypto.subtle.digest("SHA-256",data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function signup(){
  let user=username.value.trim();
  let pass=password.value.trim();
  if(!user||!pass) return;
  if(localStorage.getItem("user_"+user)){
    authMessage.innerText="User exists.";
    return;
  }
  localStorage.setItem("user_"+user, await hash(pass));
  authMessage.innerText="Signup successful!";
}

async function login(){
  let user=username.value.trim();
  let pass=password.value.trim();

  if(user===MASTER_ACCOUNT && pass===MASTER_PASSWORD){
    currentUser=user;
    startIDE();
    return;
  }

  let stored=localStorage.getItem("user_"+user);
  if(!stored){authMessage.innerText="No account.";return;}
  if(stored!==await hash(pass)){authMessage.innerText="Wrong password.";return;}

  currentUser=user;
  startIDE();
}

function guest(){currentUser="guest";startIDE();}
function logout(){location.reload();}

/* ---------------- START IDE ---------------- */

function startIDE(){
  authScreen.style.display="none";
  if(currentUser!=="guest") saveBtn.style.display="inline-block";

  if(currentUser!=="guest"){
    createFilesButton(currentUser);
  }

  if(currentUser===MASTER_ACCOUNT){
    createOtherAccountsButton();
  }
}

/* ---------------- FILE MANAGEMENT ---------------- */

function createFilesButton(user){
  let filesBtn=document.createElement("button");
  filesBtn.textContent="Files";
  toolbar.appendChild(filesBtn);

  let dropdown=document.createElement("div");
  dropdown.className="dropdown";
  toolbar.appendChild(dropdown);

  filesBtn.onclick=()=>{
    dropdown.classList.toggle("show");
    dropdown.innerHTML="";

    for(let i=0;i<localStorage.length;i++){
      let key=localStorage.key(i);
      if(key.startsWith("file_"+user+"_")){
        let fileName=key.replace("file_"+user+"_","");

        let fileBtn=document.createElement("button");
        fileBtn.textContent=fileName;

        fileBtn.onclick=()=>{
          editor.setValue(localStorage.getItem(key));
        };

        // RENAME
        let renameBtn=document.createElement("button");
        renameBtn.textContent="Rename";
        renameBtn.onclick=()=>{
          let newName=prompt("New file name:");
          if(!newName) return;
          let newKey="file_"+user+"_"+newName;
          localStorage.setItem(newKey,localStorage.getItem(key));
          localStorage.removeItem(key);
          alert("Renamed!");
          dropdown.classList.remove("show");
        };

        // DELETE
        let deleteBtn=document.createElement("button");
        deleteBtn.textContent="Delete";
        deleteBtn.onclick=()=>{
          if(confirm("Delete file?")){
            localStorage.removeItem(key);
            alert("Deleted!");
            dropdown.classList.remove("show");
          }
        };

        dropdown.appendChild(fileBtn);
        dropdown.appendChild(renameBtn);
        dropdown.appendChild(deleteBtn);
      }
    }
  };
}

/* ---------------- MASTER OTHER ACCOUNTS ---------------- */

function createOtherAccountsButton(){
  let btn=document.createElement("button");
  btn.textContent="Other Accounts";
  toolbar.appendChild(btn);

  let dropdown=document.createElement("div");
  dropdown.className="dropdown";
  toolbar.appendChild(dropdown);

  btn.onclick=()=>{
    dropdown.classList.toggle("show");
    dropdown.innerHTML="";

    for(let i=0;i<localStorage.length;i++){
      let key=localStorage.key(i);
      if(key.startsWith("user_")){
        let user=key.replace("user_","");
        if(user===MASTER_ACCOUNT) continue;

        let userBtn=document.createElement("button");
        userBtn.textContent=user;

        userBtn.onclick=()=>{
          dropdown.innerHTML="";

          let found=false;

          for(let j=0;j<localStorage.length;j++){
            let fileKey=localStorage.key(j);
            if(fileKey.startsWith("file_"+user+"_")){
              found=true;
              let fileName=fileKey.replace("file_"+user+"_","");

              let fileBtn=document.createElement("button");
              fileBtn.textContent=fileName;
              fileBtn.onclick=()=>{
                editor.setValue(localStorage.getItem(fileKey));
              };

              let deleteBtn=document.createElement("button");
              deleteBtn.textContent="Delete";
              deleteBtn.onclick=()=>{
                if(confirm("Delete this user's file?")){
                  localStorage.removeItem(fileKey);
                  alert("Deleted!");
                  dropdown.classList.remove("show");
                }
              };

              dropdown.appendChild(fileBtn);
              dropdown.appendChild(deleteBtn);
            }
          }

          if(!found){
            let none=document.createElement("button");
            none.textContent="No files";
            dropdown.appendChild(none);
          }
        };

        dropdown.appendChild(userBtn);
      }
    }
  };
}

/* ---------------- RUN ---------------- */

function runCode(){
  outputContainer.innerHTML="";
  Sk.configure({
    output:(text)=>{
      let div=document.createElement("div");
      div.textContent=text;
      outputContainer.appendChild(div);
    },
    read:x=>Sk.builtinFiles["files"][x]
  });
  Sk.misceval.asyncToPromise(()=>{
    return Sk.importMainWithBody("<stdin>",false,editor.getValue(),true);
  });
}

function newFile(){editor.setValue("");}
function copyCode(){navigator.clipboard.writeText(editor.getValue());}
function saveFile(){
  if(currentUser==="guest"){alert("Guests cannot save.");return;}
  let name=prompt("File name:");
  if(!name) return;
  localStorage.setItem("file_"+currentUser+"_"+name,editor.getValue());
  alert("Saved!");
}
</script>
</body>
</html>
