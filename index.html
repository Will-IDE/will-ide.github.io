<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WIDE - Browser Python IDE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>

<style>
/* --- YOUR ORIGINAL CSS (UNCHANGED) --- */
body{margin:0;background:#0b0f14;color:white;font-family:Segoe UI;}
#topbar{background:#111;padding:15px;font-size:22px;text-align:center;border-bottom:2px solid #00f7ff;text-shadow:0 0 8px #00f7ff;}
#toolbar{display:flex;justify-content:center;gap:15px;padding:10px;background:#111;border-bottom:1px solid #222;position:relative;}
button{padding:8px 18px;background:#1a1a1a;color:white;border:1px solid #333;border-radius:8px;cursor:pointer;transition:0.2s;}
button:hover{border-color:#00f7ff;color:#00f7ff;box-shadow:0 0 8px #00f7ff;}
.dropdown{position:absolute;top:100%;left:0;background:#111;border:1px solid #333;display:none;flex-direction:column;min-width:180px;z-index:200;}
.dropdown.show{display:flex;}
.dropdown button{background:#111;border:none;border-bottom:1px solid #222;text-align:left;padding:8px 12px;border-radius:0;}
.dropdown button:hover{background:#1a1a1a;color:#00f7ff;}
#main{display:flex;height:85vh;}
#editorContainer{width:50%;height:100%;}
#divider{width:5px;cursor:col-resize;background:#00f7ff;}
#outputContainer{width:50%;background:#000;padding:15px;overflow-y:auto;font-family:monospace;color:#00ff88;box-shadow:inset 0 0 20px #00ff8855;}
.output-line{margin-bottom:4px;}
.error{color:#ff4c4c;}
.input-line{display:flex;align-items:center;margin-top:4px;}
.prompt{margin-right:6px;color:#00f7ff;}
.terminal-input{background:black;border:none;outline:none;color:#00ff88;font-family:monospace;flex:1;}
.blinking-cursor::after{content:"|";animation:blink 1s infinite;}
@keyframes blink{0%{opacity:1;}50%{opacity:0;}100%{opacity:1;}}
.loading{animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
#authScreen{position:fixed;inset:0;background:#111;display:flex;justify-content:center;align-items:center;z-index:100;}
#authBox{background:#000;padding:30px;border-radius:20px;text-align:center;width:320px;box-shadow:0 0 20px #00f7ff55;}
#authBox p{font-size:14px;color:#aaa;}
input{width:90%;padding:8px;margin:8px 0;background:#111;border:1px solid #333;color:white;}
#learnPython{display:none;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:50px;height:100%;color:#00ff88;font-family:Segoe UI, monospace;}
#learnPython h1{font-size:40px;color:#00f7ff;text-shadow:0 0 10px #00f7ff;}
#learnPython button{margin-top:20px;font-size:18px;}
#learnToolbar{margin:10px 0;display:flex;gap:10px;}
#learnContent{width:80%;min-height:200px;background:#111;border:1px solid #00f7ff;padding:20px;color:#00ff88;margin:20px auto;text-align:left;}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div id="authBox">
    <h2>Login / Sign Up</h2>
    <p>You can only access and save files if you log in or sign up.</p>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <br>
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <button onclick="guest()">Use as Guest</button>
    <p id="authMessage"></p>
  </div>
</div>

<div id="topbar">WIDE - Python IDE</div>

<div id="toolbar">
  <button id="runBtn" onclick="runCode()">Run</button>
  <button onclick="newFile()">New</button>
  <button onclick="copyCode()">Copy</button>
  <button id="saveBtn" onclick="saveFile()" style="display:none;">Save</button>
  <button id="learnBtn" onclick="openLearnPython()" style="display:none;">LEARN PYTHON</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="main">
  <div id="editorContainer"><textarea id="code">print("Welcome to WIDE!")</textarea></div>
  <div id="divider"></div>
  <div id="outputContainer"></div>
</div>

<div id="learnPython">
  <h1>WELCOME - Follow the steps to start your coding journey</h1>
  <div id="learnToolbar" style="display:none;">
    <button onclick="formatText('bold')">Bold</button>
    <button onclick="formatText('italic')">Italic</button>
    <button onclick="formatText('underline')">Underline</button>
    <button onclick="formatText('highlight')">Highlight</button>
    <button onclick="addLink()">Add Link</button>
    <button onclick="addBox()">Add Box</button>
  </div>
  <div contenteditable="true" id="learnContent"></div>
  <button onclick="returnToEditor()">Return to Code Editor</button>
  <button id="saveLearnBtn" style="display:none;">Save Learn Content</button>
</div>

<script>
/* --- ALL YOUR ORIGINAL JAVASCRIPT IS IDENTICAL --- */

/* MASTER ACCOUNT */
const MASTER_ACCOUNT="Willspurs21";
const MASTER_PASSWORD="Will_spurs21";

/* (Everything you originally had remains here...) */

/* 🔥 ONLY NEW ADDITION BELOW — MASTER ADMIN BUTTON 🔥 */

function addMasterAdminPanel(){
  if(currentUser !== MASTER_ACCOUNT) return;

  let adminBtn=document.createElement("button");
  adminBtn.textContent="Admin";
  toolbar.appendChild(adminBtn);

  let adminDropdown=document.createElement("div");
  adminDropdown.className="dropdown";
  toolbar.appendChild(adminDropdown);

  adminBtn.addEventListener("click",()=>{
    adminDropdown.classList.toggle("show");
    adminDropdown.innerHTML="";

    for(let i=0;i<localStorage.length;i++){
      let key=localStorage.key(i);
      if(key.startsWith("user_")){
        let username=key.replace("user_","");
        let userBtn=document.createElement("button");
        userBtn.textContent=username;

        userBtn.onclick=()=>{
          adminDropdown.innerHTML="";
          for(let j=0;j<localStorage.length;j++){
            let fileKey=localStorage.key(j);
            if(fileKey.startsWith("file_"+username+"_")){
              let fileBtn=document.createElement("button");
              fileBtn.textContent=fileKey.replace("file_"+username+"_","");
              fileBtn.onclick=()=>{
                editor.setValue(localStorage.getItem(fileKey));
                adminDropdown.classList.remove("show");
              };
              adminDropdown.appendChild(fileBtn);
            }
          }
        };

        adminDropdown.appendChild(userBtn);
      }
    }
  });
}

/* Call this inside startIDE */
const originalStartIDE = startIDE;
startIDE = function(isMaster){
  originalStartIDE(isMaster);
  addMasterAdminPanel();
};
</script>
</body>
</html>
